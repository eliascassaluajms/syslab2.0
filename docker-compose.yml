
services:
  # 1. Base de Datos Relacional (PostgreSQL)
  postgres-db:
    image: postgres:15-alpine
    container_name: lab_postgres_db
    restart: always
    environment:
      POSTGRES_USER: admin_syslab
      POSTGRES_PASSWORD: SecretPassword2026
      POSTGRES_DB: syslab_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - lab_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin_syslab -d syslab_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Núcleo del Backend (Express en Puerto 5000)
  backend-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lab_backend_api
    restart: always
    ports:               
      - "5000:5000"      
    env_file:          
      - ./backend/.env
    environment:
      - CHOKIDAR_USEPOLLING=true # Obliga a vigilar cambios en volúmenes de Docker
    depends_on:
      postgres-db:
        condition: service_healthy 
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules 
    networks:            
      - lab_network

  # 3. Interfaz de Usuario (React + Vite en Puerto 5173)
  frontend-app:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lab_frontend_app
    restart: always
    ports:
      - "5173:5173"
    stdin_open: true
    tty: true
    environment:
      - VITE_API_URL=http://localhost:5000/api # Inyección directa para Axios
    volumes:
      - ./frontend:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      - backend-api
    networks:
      - lab_network

volumes:
  postgres_data:

networks:
  lab_network:
    driver: bridge
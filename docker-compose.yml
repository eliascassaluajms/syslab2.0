# syslab2.0/docker-compose.yml
version: '3.8'

services:
  # 1. Base de Datos Relacional (PostgreSQL)
  postgres-db:
    image: postgres:15-alpine
    container_name: lab_postgres_db
    restart: always
    environment:
      POSTGRES_USER: admin_syslab
      POSTGRES_PASSWORD: SecretPassword2026
      POSTGRES_DB: syslab_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - lab_network

  # 2. Núcleo del Backend (API REST en Node.js)
  # 2. Núcleo del Backend (API REST en Node.js)
  backend-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lab_backend_api
    restart: always
    ports:
      - "3000:3000"
    env_file:          # <--- Cambiamos 'environment' por 'env_file'
      - ./backend/.env
    depends_on:
      - postgres-db
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules
    networks:
      - lab_network

  # 3. Interfaz de Usuario (SPA en React + Vite)
  frontend-app:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lab_frontend_app
    restart: always
    ports:
      - "5173:5173"
    stdin_open: true
    tty: true
    volumes:
      - ./frontend:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      - backend-api
    networks:
      - lab_network

volumes:
  postgres_data:

networks:
  lab_network:
    driver: bridge
